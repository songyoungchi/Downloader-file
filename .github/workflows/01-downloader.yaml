name: ⬇️  01- Download from url

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of URLs to download'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: 'Password for zip files (optional)'
        required: false
        default: ''
        type: string
      save_in_new_branch:
        description: 'Save files in a new branch (keeps main branch clean)'
        required: false
        default: false
        type: boolean

jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ======================= Caching =======================
      - name: Cache WARP Docker image
        id: cache-warp
        uses: actions/cache@v4
        with:
          path: warp-image.tar
          key: warp-image-${{ runner.os }}-v1

      - name: Load or pull WARP image
        run: |
          if [ -f warp-image.tar ]; then
            echo "🔄 Loading WARP image from cache..."
            docker load < warp-image.tar
          else
            echo "⬇️ Pulling WARP image..."
            docker pull caomingjun/warp
            docker save caomingjun/warp -o warp-image.tar
          fi

      - name: Start WARP Container
        run: |
          echo "🚀 Starting Cloudflare WARP container..."
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          echo "🔍 Checking WARP status (every second)..."
          for i in {1..30}; do
            sleep 1
            RESULT=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "✅ WARP is active!"
              echo "$RESULT"
              break
            fi
          done
          FINAL=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
          if echo "$FINAL" | grep -qE "warp=(on|plus)"; then
            echo "✅ WARP proxy is ready!"
          else
            echo "⚠️ WARP might not be fully active, but continuing anyway..."
          fi

      - name: Cache apt packages
        id: cache-apt
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: apt-packages-${{ runner.os }}-v1

      - name: Install dependencies
        run: |
          if [ -d ~/apt-cache ]; then
            echo "📦 Using cached apt packages..."
            sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip curl file
          mkdir -p ~/apt-cache
          sudo cp /var/cache/apt/archives/*.deb ~/apt-cache/
          sudo chmod 644 ~/apt-cache/*.deb

      # ======================= Download logic =======================
      - name: Download files
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_THRESHOLD_MB=90
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          mkdir -p downloads tmp_downloads

          # Helper functions
          get_random_word() { echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}"; }
          get_unique_folder() {
            local BASE_PATH="$1" NAME="$2"
            if [ ! -d "$BASE_PATH/$NAME" ]; then echo "$NAME"; return; fi
            local SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${NAME}_${SUFFIX}" ]; do SUFFIX=$(get_random_word); done
            echo "${NAME}_${SUFFIX}"
          }

          create_error_file() {
            local FILENAME="$1" ERROR_MSG="$2" URL="$3"
            local FOLDER_NAME=$(get_unique_folder "downloads" "${FILENAME%.*}")
            mkdir -p "downloads/$FOLDER_NAME"
            cat > "downloads/$FOLDER_NAME/README.md" << EOFMD
          # ${FILENAME} - Download Failed

          | Property | Value |
          |----------|-------|
          | **File** | \`${FILENAME}\` |
          | **URL** | ${URL} |
          | **Date** | $(date '+%Y-%m-%d %H:%M:%S UTC') |
          | **Status** | **FAILED** |

          ## Error Details
          \`\`\`
          $ERROR_MSG
          \`\`\`

          *Powered by [actionfamily.lol](https://actionfamily.lol/)*
          EOFMD
          }

          download_with_retry() {
            local URL="$1" FILENAME="$2"
            local MAX_RETRIES=2 SUCCESS=false ERROR_LOG="" EXPECTED_SIZE=0 ACTUAL_SIZE=0

            EXPECTED_SIZE=$(curl -sI -L "$URL" | grep -i content-length | tail -1 | awk '{print $2}' | tr -d '\r') || true
            local CONTENT_TYPE=$(curl -sI -L "$URL" | grep -i content-type | tail -1 | cut -d' ' -f2- | tr -d '\r')

            for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
              echo "Attempt $attempt for $FILENAME"
              if aria2c --split=4 --max-connection-per-server=4 --min-split-size=20M --max-tries=3 --timeout=120 --connect-timeout=30 -d tmp_downloads -o "$FILENAME" "$URL"; then
                SUCCESS=true && break
              fi
              echo "aria2 failed, trying curl..."
              if curl -L -f -# --retry 3 --connect-timeout 30 --max-time 3600 -A "Mozilla/5.0" -o "tmp_downloads/$FILENAME" "$URL"; then
                SUCCESS=true && break
              fi
              sleep 5
            done

            if [ "$SUCCESS" = true ] && [ -f "tmp_downloads/$FILENAME" ]; then
              ACTUAL_SIZE=$(stat -c%s "tmp_downloads/$FILENAME")

              # 1. Size mismatch check
              if [ -n "$EXPECTED_SIZE" ] && [ "$EXPECTED_SIZE" -gt 0 ] && [ "$ACTUAL_SIZE" -lt $(( EXPECTED_SIZE * 95 / 100 )) ]; then
                create_error_file "$FILENAME" "Size mismatch: expected $EXPECTED_SIZE, got $ACTUAL_SIZE bytes." "$URL"
                rm -f "tmp_downloads/$FILENAME"; return 1
              fi

              # 2. MIME type detection
              MIME=$(file --mime-type -b "tmp_downloads/$FILENAME")
              if [[ "$MIME" == text/html ]] || [[ "$MIME" == text/xml ]]; then
                create_error_file "$FILENAME" "Downloaded file is HTML/XML page (MIME: $MIME). Server returned an error page." "$URL"
                rm -f "tmp_downloads/$FILENAME"; return 1
              fi

              # 3. If server gave Content-Type text/html
              if echo "$CONTENT_TYPE" | grep -qi 'text/html'; then
                create_error_file "$FILENAME" "Server Content-Type is text/html." "$URL"
                rm -f "tmp_downloads/$FILENAME"; return 1
              fi

              # 4. If file suspiciously small (<1MB) and starts with HTML
              if { [ -z "$EXPECTED_SIZE" ] || [ "$EXPECTED_SIZE" -eq 0 ]; } && [ "$ACTUAL_SIZE" -lt 1048576 ]; then
                FIRST_BYTES=$(head -c 200 "tmp_downloads/$FILENAME")
                if echo "$FIRST_BYTES" | grep -qi '<!DOCTYPE\|<html'; then
                  create_error_file "$FILENAME" "File is small (<1MB) and starts with HTML." "$URL"
                  rm -f "tmp_downloads/$FILENAME"; return 1
                fi
              fi

              echo "✅ Download verified."
              return 0
            else
              create_error_file "$FILENAME" "$ERROR_LOG" "$URL"
              return 1
            fi
          }

          for URL in $URLS; do
            FILENAME=$(basename "$URL" | sed 's/%20/ /g; s/%2F/-/g; s/[?#].*//' | sed 's/[<>:"|?*]/_/g')
            download_with_retry "$URL" "$FILENAME" || echo "Failed: $FILENAME"
          done

          # ---- Post-download: Zip or Normal mode ----
          if [ "$MODE" = "zip" ]; then
            if [ -n "$(ls -A tmp_downloads 2>/dev/null)" ]; then
              ARCHIVE_NAME="archive_$(date +%Y%m%d_%H%M%S)"
              FOLDER_NAME=$(get_unique_folder "downloads" "$ARCHIVE_NAME")
              mkdir -p "downloads/$FOLDER_NAME"
              if [ -n "$ZIP_PASSWORD" ]; then
                zip -j -P "$ZIP_PASSWORD" "downloads/$FOLDER_NAME/${ARCHIVE_NAME}.zip" tmp_downloads/*
              else
                zip -j "downloads/$FOLDER_NAME/${ARCHIVE_NAME}.zip" tmp_downloads/*
              fi

              ZIP_SIZE=$(stat -c%s "downloads/$FOLDER_NAME/${ARCHIVE_NAME}.zip")
              ZIP_SIZE_MB=$(echo "scale=2; $ZIP_SIZE / 1024 / 1024" | bc)
              FOLDER_ENCODED=$(echo "${FOLDER_NAME}" | sed 's/ /%20/g')
              FILE_ENCODED=$(echo "${ARCHIVE_NAME}.zip" | sed 's/ /%20/g')
              RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${FILE_ENCODED}"

              cat > "downloads/$FOLDER_NAME/README.md" << EOFMD
          # ${ARCHIVE_NAME} Archive

          | Property | Value |
          |----------|-------|
          | **Archive Name** | \`${ARCHIVE_NAME}.zip\` |
          | **Size** | ${ZIP_SIZE_MB} MB |
          | **Status** | **Complete (100%)** |
          $([ -n "$ZIP_PASSWORD" ] && echo "| **Password Protected** | **YES** |" || echo "| **Password Protected** | **NO** |")
          
          ## Download Link
          | File | Link |
          |------|------|
          | \`${ARCHIVE_NAME}.zip\` | [Download](${RAW_LINK}) |

          *Powered by [actionfamily.lol](https://actionfamily.lol/)*
          EOFMD
            fi
            rm -rf tmp_downloads
          else
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue
              SIZE=$(stat -c%s "$FILE")
              BASENAME=$(basename "$FILE")
              BASENAME_NO_EXT="${BASENAME%.*}"

              FOLDER_NAME=$(get_unique_folder "downloads" "$BASENAME_NO_EXT")
              mkdir -p "downloads/$FOLDER_NAME"
              FOLDER_ENCODED=$(echo "${FOLDER_NAME}" | sed 's/ /%20/g')

              if [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                echo "✂️ Splitting $BASENAME into ${SPLIT_THRESHOLD_MB}MB parts..."
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -0 -s "${SPLIT_THRESHOLD_MB}m" -P "$ZIP_PASSWORD" "downloads/${FOLDER_NAME}/${BASENAME}.zip" -j "$FILE"
                else
                  zip -0 -s "${SPLIT_THRESHOLD_MB}m" "downloads/${FOLDER_NAME}/${BASENAME}.zip" -j "$FILE"
                fi
                PARTS_COUNT=$(ls downloads/${FOLDER_NAME}/${BASENAME}.z* 2>/dev/null | wc -l)
                
                DOWNLOAD_LINKS=""
                for part_file in "downloads/${FOLDER_NAME}/${BASENAME}".z* "downloads/${FOLDER_NAME}/${BASENAME}.zip"; do
                  if [ -f "$part_file" ]; then
                    PART_BASENAME=$(basename "$part_file")
                    PART_ENCODED=$(echo "${PART_BASENAME}" | sed 's/ /%20/g')
                    RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${PART_ENCODED}"
                    DOWNLOAD_LINKS="${DOWNLOAD_LINKS}| \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"$'\n'
                  fi
                done

                cat > "downloads/${FOLDER_NAME}/README.md" << EOFMD
          # ${BASENAME} Archive

          | Property | Value |
          |----------|-------|
          | **Original File** | \`${BASENAME}\` |
          | **Original Size** | $(( SIZE / 1024 / 1024 )) MB |
          | **Parts** | ${PARTS_COUNT} |
          $([ -n "$ZIP_PASSWORD" ] && echo "| **Password Protected** | **YES** |" || echo "| **Password Protected** | **NO** |")

          ## Download Links
          | File | Link |
          |------|------|
          $(printf '%s' "${DOWNLOAD_LINKS}")

          ## How to Extract
          **Windows:** Use 7-Zip or WinRAR to extract \`${BASENAME}.zip\`.
          **Linux/Mac:**  
          \`\`\`bash
          zip -F ${BASENAME}.zip --out combined.zip
          unzip combined.zip
          \`\`\`

          *Powered by [actionfamily.lol](https://actionfamily.lol/)*
          EOFMD
              else
                echo "📦 Creating zip for: $BASENAME"
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "$ZIP_PASSWORD" "downloads/${FOLDER_NAME}/${BASENAME}.zip" "$FILE"
                else
                  zip -j "downloads/${FOLDER_NAME}/${BASENAME}.zip" "$FILE"
                fi
                FILE_ENCODED=$(echo "${BASENAME}.zip" | sed 's/ /%20/g')
                RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${FILE_ENCODED}"

                cat > "downloads/${FOLDER_NAME}/README.md" << EOFMD
          # ${BASENAME} Archive

          | Property | Value |
          |----------|-------|
          | **Original File** | \`${BASENAME}\` |
          | **Size** | $(( SIZE / 1024 / 1024 )) MB |
          $([ -n "$ZIP_PASSWORD" ] && echo "| **Password Protected** | **YES** |" || echo "| **Password Protected** | **NO** |")

          ## Download Link
          | File | Link |
          |------|------|
          | \`${BASENAME}.zip\` | [Download](${RAW_LINK}) |

          *Powered by [actionfamily.lol](https://actionfamily.lol/)*
          EOFMD
              fi
            done
            rm -rf tmp_downloads
          fi

      # ======================= Final commit =======================
      - name: Commit & Push
        run: |
          SAVE_IN_NEW_BRANCH="${{ github.event.inputs.save_in_new_branch }}"
          if [ "$SAVE_IN_NEW_BRANCH" == "true" ]; then
            BRANCH="download-$(date +%Y%m%d-%H%M%S)-$(echo $RANDOM | md5sum | head -c 6)"
          else
            BRANCH="${GITHUB_REF_NAME}"
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Force-add all changed files in downloads/
          git add -f downloads/

          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Download files – $(date +%Y%m%d-%H%M%S) [skip ci]"
          git pull --rebase origin "$BRANCH" || true
          git push origin HEAD:"$BRANCH"
          echo "✅ Pushed to branch: $BRANCH"

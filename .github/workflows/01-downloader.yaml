name: ⬇️  01- Download from url

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of URLs to download'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: 'Password for zip files (optional)'
        required: false
        default: ''
        type: string

jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl file

      - name: Download files
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_THRESHOLD_MB=90
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          echo "Download mode: $MODE"
          echo "Split threshold: $SPLIT_THRESHOLD_MB MB"
          [ -n "$ZIP_PASSWORD" ] && echo "Password: ENABLED" || echo "Password: DISABLED"

          mkdir -p downloads tmp_downloads

          RANDOM_WORDS=("alpha" "beta" "gamma" "delta" "epsilon" "zeta" "theta" "kappa" "lambda" "sigma" "omega" "nova" "star" "moon" "sun" "sky" "cloud" "river" "ocean" "mountain")
          get_random_word() { echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}"; }
          get_unique_folder() {
            local BASE_PATH="$1" NAME="$2"
            if [ ! -d "$BASE_PATH/$NAME" ]; then echo "$NAME"; return; fi
            local SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${NAME}_${SUFFIX}" ]; do SUFFIX=$(get_random_word); done
            echo "${NAME}_${SUFFIX}"
          }

          create_error_file() {
            local FILENAME="$1" ERROR_MSG="$2" URL="$3"
            local FOLDER_NAME=$(get_unique_folder "downloads" "${FILENAME%.*}")
            mkdir -p "downloads/$FOLDER_NAME"
            {
              echo "# ${FILENAME} - Download Failed"
              echo ""
              echo "---"
              echo "| Property | Value |"
              echo "|---|---|"
              echo "| **File** | \`${FILENAME}\` |"
              echo "| **URL** | ${URL} |"
              echo "| **Date** | $(date '+%Y-%m-%d %H:%M:%S UTC') |"
              echo "| **Status** | **FAILED** |"
              echo ""
              echo "## Error Details"
              echo "\`\`\`"
              echo "$ERROR_MSG"
              echo "\`\`\`"
              echo ""
              echo "*Powered by [actionfamily.lol](https://actionfamily.lol/)*"
            } > "downloads/$FOLDER_NAME/README.md"
          }

          download_with_retry() {
            local URL="$1" FILENAME="$2"
            local MAX_RETRIES=2 SUCCESS=false ERROR_LOG="" EXPECTED_SIZE=0 ACTUAL_SIZE=0

            EXPECTED_SIZE=$(curl -sI -L "$URL" | grep -i content-length | tail -1 | awk '{print $2}' | tr -d '\r')
            echo "Expected size from server: ${EXPECTED_SIZE:-unknown} bytes"

            # Get Content-Type
            CONTENT_TYPE=$(curl -sI -L "$URL" | grep -i content-type | tail -1 | cut -d' ' -f2- | tr -d '\r')

            for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
              echo "Attempt $attempt for $FILENAME"
              if aria2c --split=4 --max-connection-per-server=4 --min-split-size=20M --max-tries=3 --timeout=120 --connect-timeout=30 -d tmp_downloads -o "$FILENAME" "$URL"; then
                SUCCESS=true && break
              fi
              echo "aria2 failed, trying curl..."
              if curl -L -f -# --retry 3 --connect-timeout 30 --max-time 3600 -A "Mozilla/5.0" -o "tmp_downloads/$FILENAME" "$URL"; then
                SUCCESS=true && break
              fi
              sleep 5
            done

            if [ "$SUCCESS" = true ] && [ -f "tmp_downloads/$FILENAME" ]; then
              ACTUAL_SIZE=$(stat -c%s "tmp_downloads/$FILENAME")

              # 1. Size mismatch check
              if [ -n "$EXPECTED_SIZE" ] && [ "$EXPECTED_SIZE" -gt 0 ] && [ "$ACTUAL_SIZE" -lt $(( EXPECTED_SIZE * 95 / 100 )) ]; then
                create_error_file "$FILENAME" "Size mismatch: expected $EXPECTED_SIZE, got $ACTUAL_SIZE bytes." "$URL"
                rm -f "tmp_downloads/$FILENAME"; return 1
              fi

              # 2. MIME type detection via file command
              MIME=$(file --mime-type -b "tmp_downloads/$FILENAME")
              if [[ "$MIME" == text/html ]] || [[ "$MIME" == text/xml ]]; then
                create_error_file "$FILENAME" "Downloaded file is an HTML/XML page (MIME: $MIME). Server returned an error page." "$URL"
                rm -f "tmp_downloads/$FILENAME"; return 1
              fi

              # 3. If server gave Content-Type that is text/html, also fail
              if echo "$CONTENT_TYPE" | grep -qi 'text/html'; then
                create_error_file "$FILENAME" "Server Content-Type is text/html, not a real file." "$URL"
                rm -f "tmp_downloads/$FILENAME"; return 1
              fi

              # 4. If expected size unknown, and file suspiciously small (< 1MB) + mime looks like text?
              if { [ -z "$EXPECTED_SIZE" ] || [ "$EXPECTED_SIZE" -eq 0 ]; } && [ "$ACTUAL_SIZE" -lt 1048576 ]; then
                FIRST_BYTES=$(head -c 200 "tmp_downloads/$FILENAME")
                if echo "$FIRST_BYTES" | grep -qi '<!DOCTYPE\|<html'; then
                  create_error_file "$FILENAME" "File is small (<1MB) and starts with HTML." "$URL"
                  rm -f "tmp_downloads/$FILENAME"; return 1
                fi
                # If still suspiciously small but no HTML, just warn and continue (maybe a tiny legit file)
                echo "⚠️ Warning: File is only $ACTUAL_SIZE bytes but seems valid."
              fi

              echo "✅ Download verified."
              return 0
            else
              create_error_file "$FILENAME" "$ERROR_LOG" "$URL"
              return 1
            fi
          }

          for URL in $URLS; do
            FILENAME=$(basename "$URL" | sed 's/%20/ /g; s/%2F/-/g; s/[?#].*//')
            FILENAME=$(echo "$FILENAME" | sed 's/[<>:"|?*]/_/g')
            download_with_retry "$URL" "$FILENAME" || echo "Failed: $FILENAME"
          done

          # ---- باقی‌مانده‌ی اسکریپت (Zip/فشرده‌سازی/README) دقیقاً مثل قبل بدون تغییر ----
          # ... (کد موجود از اینجا به بعد که شامل ایجاد zip، README و Commit می‌شود)
